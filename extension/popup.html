<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <title>YT Downloader</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      background: #0f0f0f;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 13px 16px 11px;
      border-bottom: 1px solid #1e1e1e;
    }
    .logo {
      width: 22px;
      height: 22px;
      background: #ff0000;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .logo svg { display: block; }
    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.01em;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-left: auto;
      background: #333;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .dot.ok  { background: #4caf50; }
    .dot.err { background: #f44336; }

    /* ── Main content ── */
    .content {
      padding: 14px 16px 16px;
    }

    .video-title {
      font-size: 12px;
      color: #bbb;
      line-height: 1.45;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      word-break: break-word;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      gap: 8px;
    }
    .btn {
      flex: 1;
      padding: 9px 0;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .btn:active:not(:disabled) { transform: scale(0.96); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .btn-mp4 { background: #ff0000; color: #fff; }
    .btn-mp4:hover:not(:disabled) { background: #d40000; }

    .btn-mp3 { background: #1e1e1e; color: #ccc; border: 1px solid #333; }
    .btn-mp3:hover:not(:disabled) { background: #272727; }

    /* ── Playlist toggle ── */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      user-select: none;
    }
    .toggle-label {
      font-size: 12px;
      color: #666;
      cursor: pointer;
    }
    .toggle {
      position: relative;
      width: 32px;
      height: 18px;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute;
      inset: 0;
      background: #2a2a2a;
      border-radius: 9px;
      border: 1px solid #333;
      transition: background 0.2s, border-color 0.2s;
    }
    .toggle input:checked ~ .toggle-track {
      background: #ff0000;
      border-color: #ff0000;
    }
    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 12px;
      height: 12px;
      background: #666;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(14px);
      background: #fff;
    }

    /* ── Status line ── */
    .status {
      margin-top: 11px;
      font-size: 12px;
      line-height: 1.4;
      min-height: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status.loading { color: #777; }
    .status.success { color: #4caf50; }
    .status.error   { color: #f44336; }

    /* ── Full-screen messages ── */
    .msg {
      padding: 22px 16px 24px;
      text-align: center;
    }
    .msg-icon { font-size: 26px; margin-bottom: 10px; }
    .msg-text {
      color: #888;
      line-height: 1.55;
      font-size: 13px;
    }
    .msg-text strong { color: #ccc; display: block; margin-bottom: 4px; }
    code {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 5px;
      padding: 3px 8px;
      font-family: 'SF Mono', Menlo, monospace;
      font-size: 12px;
      color: #e0e0e0;
      margin-top: 8px;
    }

    /* ── Progress bar ── */
    .progress-wrap {
      margin-top: 12px;
      background: #1e1e1e;
      border-radius: 3px;
      height: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #ff0000;
      border-radius: 3px;
      width: 0%;
      transition: width 0.35s ease;
    }
    .progress-fill.indeterminate {
      width: 40% !important;
      animation: indeterminate 1.4s ease-in-out infinite;
    }
    @keyframes indeterminate {
      0%   { transform: translateX(-100%); }
      100% { transform: translateX(350%); }
    }
    .progress-meta {
      margin-top: 6px;
      font-size: 11px;
      color: #555;
      display: flex;
      justify-content: space-between;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.01em;
    }
    .progress-meta span { color: #666; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 11px;
      height: 11px;
      border: 2px solid #333;
      border-top-color: #aaa;
      border-radius: 50%;
      animation: spin 0.55s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="11" height="11" viewBox="0 0 10 10" fill="none">
        <polygon points="3,1.5 9,5 3,8.5" fill="white"/>
      </svg>
    </div>
    <h1>YT Downloader</h1>
    <div class="dot" id="dot"></div>
  </div>

  <div id="app"></div>

  <script src="popup.js"></script>
</body>
</html>
